<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var t = null;
      var lang = null;
      try { t = localStorage.getItem('oasi5-theme'); } catch (e) {}
      try { lang = localStorage.getItem('oasi5-lang'); } catch (e) {}
      document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      document.documentElement.setAttribute('lang', lang === 'en' ? 'en' : 'ko');
    })();
  </script>
  <meta name="theme-color" content="#0a0e14" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oasi5</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css?v=12" />
  <link rel="stylesheet" href="hub.css?v=27" />
  <link rel="stylesheet" href="city.css?v=2" />
  <link rel="stylesheet" href="place.css?v=6" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <button type="button" id="nav-back" class="nav-back hidden" data-i18n="nav.back" aria-label="뒤로">← 뒤로</button>
        <div id="site-brand"></div>
        <nav class="header-nav" id="header-nav" aria-label="주요 메뉴">
          <button type="button" class="header-nav-btn" data-nav="home" data-i18n="nav.home">지도</button>
          <button type="button" class="header-nav-btn" data-nav="articles" data-i18n="nav.articles">기사·정보</button>
          <button type="button" class="header-nav-btn" data-nav="access" data-i18n="nav.access">시설 추천</button>
          <button type="button" class="header-nav-btn" data-nav="transit" data-i18n="nav.transit">길찾기</button>
        </nav>
      </div>
      <div class="header-right">
        <div class="legend">
          <span class="legend-item"><i class="dot help"></i> <span data-i18n="legend.help">도움 시설</span></span>
          <span class="legend-item"><i class="dot danger"></i> <span data-i18n="legend.danger">위험 지역</span></span>
        </div>
        <div class="header-controls">
          <div class="lang-switch" id="lang-switch"></div>
          <div class="theme-switch" id="theme-switch"></div>
        </div>
      </div>
    </div>
  </header>

  <div id="view-home" class="app-view app-view-active">
    <main class="main">
      <div class="layout-grid">
        <section class="map-section">
          <div class="region-bar" id="region-bar"></div>
          <div class="city-bar hidden" id="city-bar">
            <p class="city-bar-label" id="city-bar-label" data-i18n="home.cityPick">시·군 선택</p>
            <div class="city-bar-buttons" id="city-bar-buttons"></div>
          </div>
          <div class="map-wrap">
            <div id="map"></div>
          </div>
          <p class="map-hint" data-i18n="home.mapHint">지역 → 시·군 → 시설 순으로 앱 안에서 이동합니다</p>
        </section>

        <section class="info-panel" id="info-panel">
          <div class="panel-head">
            <div>
              <h2 id="panel-region" data-i18n="home.nation">전국</h2>
              <p id="panel-summary" data-i18n="home.summaryList">등록된 도움 시설과 위험 지역 목록입니다.</p>
            </div>
            <div class="panel-stats">
              <span class="stat help-stat"><span data-i18n="home.statHelp">도움</span> <strong id="stat-help">0</strong></span>
              <span class="stat danger-stat"><span data-i18n="home.statDanger">위험</span> <strong id="stat-danger">0</strong></span>
            </div>
          </div>
          <div id="detail-card" class="detail-card hidden"></div>
          <div class="panel-columns">
            <div class="panel-col">
              <h3><span class="col-icon help"></span> <span data-i18n="home.helpTitle">도움 시설</span></h3>
              <ul id="help-list" class="place-list"></ul>
            </div>
            <div class="panel-col">
              <h3><span class="col-icon danger"></span> <span data-i18n="home.dangerTitle">위험 지역</span></h3>
              <ul id="danger-list" class="place-list"></ul>
            </div>
          </div>
          <div id="growth-chart" class="growth-chart-wrap"></div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <p><span id="footer-brand"></span> · <span id="footer-sources" data-i18n="footer.sources">데이터 출처: 공공복지시설, 여성긴급전화1366, TAAS 교통사고다발지역 등</span></p>
    </footer>
  </div>

  <div id="view-city" class="app-view hidden"></div>
  <div id="view-place" class="app-view hidden"></div>
  <div id="view-articles" class="app-view hidden"></div>
  <div id="view-access" class="app-view hidden"></div>
  <div id="view-transit" class="app-view hidden"></div>

  <script src="theme.js?v=3"></script>
  <script src="i18n.js?v=5"></script>
  <script src="brand.js?v=5"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="facility-details.js"></script>
  <script src="place-info.js?v=3"></script>
  <script src="place-scores.js?v=2"></script>
  <script src="growth-chart.js"></script>
  <script src="place-images.js?v=1"></script>
  <script src="photo-loader.js?v=4"></script>
  <script src="regions.js"></script>
  <script src="places.js?v=9"></script>
  <script src="place-i18n.js?v=2"></script>
  <script src="city-view.js?v=6"></script>
  <script src="place-articles.js?v=1"></script>
  <script src="place-reviews.js?v=3"></script>
  <script src="place-view.js?v=8"></script>
  <script src="news-feed.js?v=5"></script>
  <script src="articles-hub.js?v=9"></script>
  <script src="oasi-fast.js?v=1"></script>
  <script src="naver-transit.js?v=12"></script>
  <script src="disability-access.js?v=31"></script>
  <script src="subway-stations.js?v=1"></script>
  <script src="kric-mobility.js?v=1"></script>
  <script src="transit-routes.js?v=9"></script>
  <script src="transit-guide.js?v=24"></script>
  <script src="app-nav.js?v=11"></script>
  <script src="script.js?v=19"></script>
  <script>
    ThemeManager.init();
    I18n.init();
    Oasi5Brand.mount('#site-brand', { tagline: I18n.t('brand.tagline'), href: '#/' });
    document.getElementById('footer-brand').innerHTML = Oasi5Brand.render({ size: 'sm' });
    AppNav.init();
    document.addEventListener('oasi5:langchange', function () {
      Oasi5Brand.mount('#site-brand', { tagline: I18n.t('brand.tagline'), href: '#/' });
      if (typeof AppNav !== 'undefined' && AppNav.refreshLanguage) AppNav.refreshLanguage();
    });
  </script>
</body>
</html>
